<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Video and audio clips from GhostJam investigations." />
  <title>Media | GhostJam</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <nav class="site-nav" role="navigation" aria-label="Main navigation">
    <div class="nav-inner">
      <a href="/" class="nav-logo" id="nav-title">GhostJam</a>
      <ul class="nav-links" id="nav-links" role="list">
        <li><a href="/">Home</a></li>
      </ul>
      <button class="nav-toggle" id="nav-toggle"
        aria-label="Toggle navigation" aria-expanded="false" aria-controls="nav-links">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <main>
    <div class="media-page" aria-live="polite">
      <h1 id="page-title">Media</h1>
      <p class="page-intro" id="page-intro"></p>
      <div class="media-feed" id="media-feed"></div>
      <p class="page-intro" id="empty-msg" style="display:none; margin-top:2rem;">
        No clips yet — check back soon.
      </p>
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> <span id="footer-text"></span> &nbsp;|&nbsp; <a href="#" id="footer-email"></a></p>
  </footer>

  <script>
    const toggle   = document.getElementById('nav-toggle');
    const navLinks = document.getElementById('nav-links');
    toggle.addEventListener('click', () => {
      const open = navLinks.classList.toggle('open');
      toggle.setAttribute('aria-expanded', String(open));
    });
    document.addEventListener('click', e => {
      if (!toggle.contains(e.target) && !navLinks.contains(e.target)) {
        navLinks.classList.remove('open');
        toggle.setAttribute('aria-expanded', 'false');
      }
    });
    document.getElementById('year').textContent = new Date().getFullYear();

    fetch('/_data/content.json')
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => {
        if (d.nav_title)     document.getElementById('nav-title').textContent   = d.nav_title;
        if (d.footer_text)   document.getElementById('footer-text').textContent = d.footer_text;
        if (d.contact_email) {
          const fe = document.getElementById('footer-email');
          fe.href = 'mailto:' + d.contact_email; fe.textContent = d.contact_email;
        }
        (d.pages || []).forEach(p => {
          if (!p.enabled) return;
          const li = document.createElement('li');
          const a  = document.createElement('a');
          a.href = '/' + p.id; a.textContent = p.label;
          if (p.id === 'media') a.setAttribute('aria-current', 'page');
          li.appendChild(a); navLinks.appendChild(li);
        });
        const li = document.createElement('li');
        li.innerHTML = '<a href="/#contact">Contact</a>';
        navLinks.appendChild(li);
      }).catch(() => {});

    // ── Extract YouTube video ID from various URL formats ──
    function youtubeId(url) {
      if (!url) return null;
      // Handle youtu.be/ID, youtube.com/watch?v=ID, youtube.com/embed/ID
      const patterns = [
        /youtu\.be\/([^?&]+)/,
        /[?&]v=([^?&]+)/,
        /\/embed\/([^?&]+)/,
        /\/shorts\/([^?&]+)/
      ];
      for (const p of patterns) {
        const m = url.match(p);
        if (m) return m[1];
      }
      return null;
    }

    fetch('/_data/media.json')
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => {
        if (d.page_title) {
          document.getElementById('page-title').textContent = d.page_title;
          document.title = d.page_title + ' | GhostJam';
        }
        if (d.page_intro) document.getElementById('page-intro').textContent = d.page_intro;

        const clips = (d.clips || []);
        if (clips.length === 0) {
          document.getElementById('empty-msg').style.display = 'block';
          return;
        }

        const feed = document.getElementById('media-feed');

        clips.forEach(clip => {
          const item = document.createElement('article');
          item.className = 'media-item';

          // ── Meta row (type badge + date + location) ──
          const meta = document.createElement('div');
          meta.className = 'media-meta';

          const badge = document.createElement('span');
          badge.className = 'media-type-badge ' + (clip.type || 'video');
          badge.textContent = (clip.type === 'audio') ? 'Audio' : 'Video';
          meta.appendChild(badge);

          if (clip.date) {
            const date = document.createElement('span');
            date.className = 'media-date';
            date.textContent = clip.date;
            meta.appendChild(date);
          }

          if (clip.location) {
            const loc = document.createElement('span');
            loc.className = 'media-location';
            loc.textContent = clip.location;
            meta.appendChild(loc);
          }

          item.appendChild(meta);

          // ── Title ──
          if (clip.title) {
            const title = document.createElement('p');
            title.className = 'media-title';
            title.textContent = clip.title;
            item.appendChild(title);
          }

          // ── Description ──
          if (clip.description) {
            const desc = document.createElement('p');
            desc.className = 'media-description';
            desc.textContent = clip.description;
            item.appendChild(desc);
          }

          // ── YouTube embed ──
          const vid = youtubeId(clip.youtube_url);
          if (vid) {
            const wrap = document.createElement('div');
            wrap.className = 'media-embed';
            const iframe = document.createElement('iframe');
            iframe.src = 'https://www.youtube.com/embed/' + vid + '?rel=0&modestbranding=1';
            iframe.title = clip.title || 'GhostJam clip';
            iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture';
            iframe.allowFullscreen = true;
            iframe.setAttribute('loading', 'lazy');
            wrap.appendChild(iframe);
            item.appendChild(wrap);
          }

          feed.appendChild(item);
        });
      }).catch(() => {
        document.getElementById('empty-msg').style.display = 'block';
      });
  </script>

</body>
</html>
